  <title>★ Linienbusarchiv.de ★ ドイツ路線バス資料館</title>
  <style>
    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: #000;
      background-color: #d8d8d8;
      background-image:
        linear-gradient(45deg, #c8c8c8 25%, transparent 25%),
        linear-gradient(-45deg, #c8c8c8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #c8c8c8 75%),
        linear-gradient(-45deg, transparent 75%, #c8c8c8 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      font-family: "MS PGothic", "ＭＳ Ｐゴシック", Osaka, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    a:link { color: #0000ee; text-decoration: underline; }
    a:visited { color: #551a8b; }
    a:hover { color: #ff0000; background: #ffff66; }

    .page {
      width: min(780px, calc(100% - 10px));
      margin: 8px auto 24px;
      border: 3px ridge #fff;
      background: #fff;
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.35);
    }

    .bus-runner {
      position: relative;
      height: 118px;
      overflow: hidden;
      border-bottom: 2px solid #000080;
      background:
        linear-gradient(#bfe5ff 0 66%, #8db86b 66% 72%, #777 72% 100%);
    }

    .bus-runner::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 18px;
      left: 0;
      border-top: 2px dashed rgba(255,255,255,.9);
    }

    .haltestelle {
      position: absolute;
      z-index: 1;
      left: 70%;
      bottom: 19px;
      width: 26px;
      height: 57px;
      pointer-events: none;
    }

    .haltestelle .pole {
      position: absolute;
      left: 12px;
      bottom: 0;
      width: 3px;
      height: 43px;
      background: #b7b7b7;
      border: 1px solid #666;
    }

    .haltestelle .sign {
      position: absolute;
      top: 0;
      left: 1px;
      width: 24px;
      height: 27px;
      border: 1px solid #666;
      border-radius: 3px;
      background: #fff;
      box-shadow: 1px 1px 2px rgba(0,0,0,.25);
    }

    .haltestelle .sign::before {
      content: "H";
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      margin: 3px auto;
      border: 2px solid #1b9c45;
      border-radius: 50%;
      color: #1b9c45;
      background: #ffdf25;
      font: bold 13px/1 Arial, sans-serif;
    }

    .running-bus {
      --bus-width: 330px;
      position: absolute;
      z-index: 2;
      bottom: 20px;
      left: 0;
      width: 330px;
      left: calc(-1 * var(--bus-width));
      width: var(--bus-width);
      max-width: 72vw;
      height: auto;
      filter: drop-shadow(4px 5px 2px rgba(0,0,0,.35));
      animation: drive-across 13s linear infinite;
      will-change: transform;
      animation: drive-across 16s linear infinite;
      will-change: left, bottom;
    }

    @keyframes drive-across {
      from { transform: translateX(-120%); }
      to   { transform: translateX(calc(780px + 120%)); }
      0%   { left: calc(-1 * var(--bus-width)); bottom: 20px; }
      7%   { bottom: 19px; }
      14%  { bottom: 21px; }
      21%  { bottom: 19px; }
      28%  { bottom: 21px; }
      35%  { bottom: 20px; }

      /* バスの前端が右寄りの停留所に着く */
      55%  { left: calc(70% - var(--bus-width) + 12px); bottom: 20px; }

      /* 同じ位置を維持するため、ここで約2秒間停止 */
      68%  { left: calc(70% - var(--bus-width) + 12px); bottom: 20px; }

      74%  { bottom: 19px; }
      80%  { bottom: 21px; }
      87%  { bottom: 19px; }
      94%  { bottom: 21px; }
      100% { left: 100%; bottom: 20px; }
    }
